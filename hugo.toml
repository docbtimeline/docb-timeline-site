baseURL = "https://docbtimeline.com"
languageCode = "en-us"
title = "DocB — Timeline"
theme = "PaperMod"
publishDir = "docs"
paginate = 10
summaryLength = 30

[params]
  description = "Constraint intelligence for a world where the bottleneck keeps moving."
  author = "DocB"
  defaultTheme = "light"
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = false
  ShowRssButtonInSectionTermList = true
  ShowToc = true
  TocOpen = false
  ShowWordCount = false
  disableScrollToTop = false
  comments = false

  [params.cover]
    hidden = false
    hiddenInList = false
    hiddenInSingle = false
    responsiveImages = true

  fuseOpts.isCaseSensitive = false
  fuseOpts.shouldSort = true
  fuseOpts.location = 0
  fuseOpts.distance = 1000
  fuseOpts.threshold = 0.4
  fuseOpts.minMatchCharLength = 2
  fuseOpts.keys = ["title", "description", "content", "tags"]

  [params.homeInfoParams]
    Title = "DocB — Timeline"
    Content = '''
Constraint intelligence for a world where the bottleneck keeps moving. Each edition traces a specific pressure shift — which actors adapted, where the consequence landed, and who's absorbing it now.

<form class="home-subscribe-form" action="https://buttondown.com/api/emails/embed-subscribe/docb" method="post" target="popupwindow" onsubmit="window.open('https://buttondown.com/docb','popupwindow')">
<input type="email" name="email" placeholder="your@email.com" required /><button type="submit">Subscribe free</button>
</form>
<p class="home-subscribe-note">No spam. Unsubscribe any time.</p>
'''

  [[params.socialIcons]]
    name = "x"
    url = "https://x.com/DocbFuture"

  [[params.socialIcons]]
    name = "rss"
    url = "/rss/"

[menu]
  [[menu.main]]
    identifier = "start"
    name = "Start Here"
    url = "/start-here/"
    weight = 5
  [[menu.main]]
    identifier = "archive"
    name = "Archive"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    identifier = "topics"
    name = "Topics"
    url = "/tags/"
    weight = 20
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 30
  [[menu.main]]
    identifier = "search"
    name = "Search"
    url = "/search/"
    weight = 40

[related]
  threshold = 50
  includeNewer = true
  toLower = true
  [[related.indices]]
    name = "tags"
    weight = 100
  [[related.indices]]
    name = "date"
    weight = 10

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false
